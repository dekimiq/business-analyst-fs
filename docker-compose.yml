services:

  postgres:
    image: pgvector/pgvector:pg16
    env_file: .env
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      TZ: 'UTC'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sh:/docker-entrypoint-initdb.d/20-init.sh
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    command: redis-server --databases 16
    environment:
      TZ: 'UTC'
    ports:
      - "6379:6379"

  backend:
    build: ./apps/backend
    env_file: .env
    environment:
      TZ: 'UTC'
    depends_on:
      - postgres
      - redis

  bot-interaction:
    build: ./apps/bot-interaction
    env_file: .env
    environment:
      TZ: 'UTC'
    depends_on:
      - postgres
      - redis

  ai-module:
    build: ./apps/ai-module
    env_file: .env
    environment:
      TZ: 'UTC'
    depends_on:
      - postgres
      - backend

  node-cron:
    build: ./apps/node-cron
    env_file: .env
    environment:
      TZ: 'UTC'
    depends_on:
      - redis

  nginx:
    image: nginx:alpine
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
