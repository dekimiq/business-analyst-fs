services:

  postgres:
    image: pgvector/pgvector:pg16
    env_file: .env
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      TZ: 'UTC'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sh:/docker-entrypoint-initdb.d/20-init.sh
    ports:
      - "127.0.0.1:${DB_PORT_HOST:-0}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --databases 16
    environment:
      TZ: 'UTC'
    ports:
      - "127.0.0.1:${REDIS_PORT_HOST:-0}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    env_file: .env
    environment:
      TZ: 'UTC'
      DB_HOST: postgres
      REDIS_HOST: redis
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME:-backend}.rule=Host(`${COMPOSE_PROJECT_NAME:-localhost}`)"
      - "traefik.http.services.${COMPOSE_PROJECT_NAME:-backend}.loadbalancer.server.port=3333"
    networks:
      - default
      - gateway
    expose:
      - "3333"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3333/status', res => process.exit(res.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend-worker:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    command: ["node", "bin/console.js", "jobs:listen", "--queue=sync"]
    env_file: .env
    environment:
      TZ: 'UTC'
      DB_HOST: postgres
      REDIS_HOST: redis
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  bot-interaction:
    build:
      context: .
      dockerfile: apps/bot-interaction/Dockerfile
    env_file: .env
    environment:
      TZ: 'UTC'
      DB_HOST: postgres
      REDIS_HOST: redis
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  ai-module:
    build:
      context: .
      dockerfile: apps/ai-module/Dockerfile
    env_file: .env
    environment:
      TZ: 'UTC'
      DB_HOST: postgres
      BACKEND_API_URL: http://backend:3333
    depends_on:
      postgres:
        condition: service_healthy
      backend:
        condition: service_healthy
    expose:
      - "3334"

  node-cron:
    build:
      context: .
      dockerfile: apps/node-cron/Dockerfile
    env_file: .env
    environment:
      TZ: 'UTC'
      DB_HOST: postgres
      REDIS_HOST: redis
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    profiles: ["with-nginx"] 
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      backend:
        condition: service_healthy

networks:
  default:
  gateway:
    external: true
    name: gateway_net

volumes:
  postgres_data:
