services:

  postgres:
    image: pgvector/pgvector:pg16
    env_file: .env
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      TZ: 'UTC'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sh:/docker-entrypoint-initdb.d/20-init.sh
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --databases 16
    environment:
      TZ: 'UTC'
    ports:
      - "6379:6379"

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    env_file: .env
    environment:
      TZ: 'UTC'
      DB_HOST: postgres
      REDIS_HOST: redis
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  bot-interaction:
    build:
      context: .
      dockerfile: apps/bot-interaction/Dockerfile
    env_file: .env
    environment:
      TZ: 'UTC'
      DB_HOST: postgres
      REDIS_HOST: redis
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  ai-module:
    build:
      context: .
      dockerfile: apps/ai-module/Dockerfile
    env_file: .env
    environment:
      TZ: 'UTC'
      DB_HOST: postgres
      BACKEND_API_URL: http://backend:3333
    depends_on:
      postgres:
        condition: service_healthy
      backend:
        condition: service_started

  node-cron:
    build:
      context: .
      dockerfile: apps/node-cron/Dockerfile
    env_file: .env
    environment:
      TZ: 'UTC'
      DB_HOST: postgres
      REDIS_HOST: redis
    depends_on:
      redis:
        condition: service_started

  nginx:
    image: nginx:alpine
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf
    ports:
      - "${NGINX_PORT:-80}:80"
      - "${NGINX_SSL_PORT:-443}:443"
    depends_on:
      - backend

volumes:
  postgres_data:
