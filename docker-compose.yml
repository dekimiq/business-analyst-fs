services:

  postgres:
    image: pgvector/pgvector:pg16
    env_file: .env
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_root
      TZ: ${TZ}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    command: redis-server --databases 16
    environment:
      TZ: ${TZ}
    ports:
      - "6379:6379"

  backend:
    build: ./apps/backend
    env_file: .env
    environment:
      TZ: ${TZ}
    depends_on:
      - postgres
      - redis
    ports:
      - "3333:3333"

  bot-interaction:
    build: ./apps/bot-interaction
    env_file: .env
    environment:
      TZ: ${TZ}
    depends_on:
      - postgres
      - redis

  ai-module:
    build: ./apps/ai-module
    env_file: .env
    environment:
      TZ: ${TZ}
    depends_on:
      - postgres
      - backend

  node-cron:
    build: ./apps/node-cron
    env_file: .env
    environment:
      TZ: ${TZ}
    depends_on:
      - redis

  nginx:
    image: nginx:alpine
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
